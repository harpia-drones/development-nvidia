services:
  harpia:
    container_name: harpia
    image: ufrjharpia/development:cbr25-amd64        
    
    privileged: true  
    runtime: nvidia                                       # Use GPU
    network_mode: host                                    # Share networks interface
    tty: true                                             # Keeps container running
    
    environment:
      # System enrironment variables
      - DISPLAY=${DISPLAY}                                # Link the host display to container display
      - DEBIAN_FRONTEND=noninteractive                    # Sets non-interactive mode
      - NO_AT_BRIDGE=1                                    # Disables at-bridge
      - PATH=$PATH:/root/.local/bin:/usr/local/bin        # Adds local bin to path
      
      # ROS2 required environment variables
      - LANG=C.UTF-8                                      # Sets language to C.UTF-8
      - LC_ALL=C.UTF-8                                    # Sets locale to C.UTF-8
      - ROS_DISTRO=jazzy
 
      # GPU environment variables
      - NVIDIA_DRIVER_CAPABILITIES=all                    # Use all GPU capabilities
      - NVIDIA_VISIBLE_DEVICES=all                        # Use all GPUs
      - __NV_PRIME_RENDER_OFFLOAD=1                       # Use NVIDIA GPU for rendering
      - __GLX_VENDOR_LIBRARY_NAME=nvidia                  # Use NVIDIA GLX library
      - XDG_RUNTIME_DIR=/tmp/runtime-user                 # Sets runtime directory
      - QT_X11_NO_MITSHM=1                                # Disables MIT-SHM

      # Hardware acceleration for gazebo
      - LIBGL_ALWAYS_SOFTWARE=0                           # Ables hardware aceleration
      - GALLIUM_DRIVER=llvmpipe                           # Fallback if acceleration fails
    volumes:  
      - ./harpia_ws/src:/root/harpia_ws/src               # Links host and container files

      # Devices
      - /dev:/dev                                         # TAKE CARE WHEN USING IT | ONLY USE /dev/video* and /dev/ttyUSB*
      - /run/udev:/run/udev      

      # General settings
      - /etc/localtime:/etc/localtime:ro                  # Sets timezone 
      - /tmp/.X11-unix:/tmp/.X11-unix                     # Allows gui apps to run (Gazebo)
      
      # GPU
      - /dev/dri:/dev/dri                                 # Enable GPU direct acess, by passing X11
      - /tmp/runtime-user:/tmp/runtime-user

